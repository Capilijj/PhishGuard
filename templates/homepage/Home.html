<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Home</title>
    <!-- Prevent browser caching — back button forces server check -->
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0"/>
    <meta http-equiv="Pragma" content="no-cache"/>
    <meta http-equiv="Expires" content="0"/>
    <style>
        body { font-family: Arial, sans-serif; background: #f2f2f2; }
        .content { max-width: 600px; margin: 100px auto; padding: 30px; background: white; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.2); }
        h1 { text-align: center; }
        a.button { display: inline-block; margin: 16px auto; padding: 8px 16px; background: #e53935; color: white; text-decoration: none; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="content">
        <h1>Welcome to Home</h1>
        <p>This page is protected for logged-in users.</p>
        <p><a href="/logout/" class="button">Logout</a></p>
    </div>
</body>
</html>
